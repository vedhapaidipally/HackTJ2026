<html>
    <title>Dental Provider Choose Patient</title>
    <body>
        <h1>Choose Dental Patient</h1>
        <form action="/select_patient" method="post">
            <label for="patient">Select a patient:</label>
            <select id="patient" name="patient">
                <option value="patient1">Patient 1</option>
                <option value="patient2">Patient 2</option>
                <option value="patient3">Patient 3</option>
            </select>
            <input type="submit" value="Submit">
        </form>
    </body>
</html>
